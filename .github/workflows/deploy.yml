# GitHub Pages 自動デプロイ（mainブランチにpushされるたびに実行）
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # 手動実行も可能にする

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4
      - name: Pages設定
        uses: actions/configure-pages@v4
      - name: サイト一式をアーティファクト化（ルートをそのまま公開）
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: デプロイ
        id: deployment
        uses: actions/deploy-pages@v4
